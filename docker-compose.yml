services:
  # ── Web / Spring Boot container ──────────────────────────────────────────
  web:
    build:
      context: ./docker
      dockerfile: Dockerfile.web
    container_name: springboot-web
    ports:
      - "8443:8443"   # website (NGINX → Spring Boot)
      - "2222:2222"   # SSH
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/B-KUOCH_Chyhang-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Hello@123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ── MySQL database container ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: "B-KUOCH_Chyhang-db"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pHello@123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  # ── phpMyAdmin container ─────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8888:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: Hello@123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
