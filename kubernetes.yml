# ── Namespace ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: fq02

---
# ── MySQL Deployment ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
  namespace: fq02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-db
  template:
    metadata:
      labels:
        app: mysql-db
    spec:
      containers:
        - name: mysql-db
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Hello@123"
            - name: MYSQL_DATABASE
              value: "B-KUOCH_Chyhang-db"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}

---
# ── MySQL Service ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: fq02
spec:
  selector:
    app: mysql-db
  ports:
    - port: 3306
      targetPort: 3306

---
# ── Web (Spring Boot + NGINX) Deployment ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-web
  namespace: fq02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot-web
  template:
    metadata:
      labels:
        app: springboot-web
    spec:
      containers:
        - name: springboot-web
          image: final_ex2-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8443
            - containerPort: 2222
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://db:3306/B-KUOCH_Chyhang-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "Hello@123"

---
# ── Web Service ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: springboot-web
  namespace: fq02
spec:
  selector:
    app: springboot-web
  type: NodePort
  ports:
    - name: website
      port: 8443
      targetPort: 8443
      nodePort: 30443
    - name: ssh
      port: 2222
      targetPort: 2222
      nodePort: 30222
